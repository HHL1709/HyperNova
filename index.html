<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>HyperNova — Next-Gen Gaming Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{
  --bg:#03040a;--bg2:#070c14;--bg3:#0d1526;
  --cyan:#00f5ff;--pink:#ff006e;--yellow:#ffe600;--green:#00ff88;
  --cyan2:#00c8d4;--pink2:#cc0057;
  --t1:#e8f4f8;--t2:#8ab4c8;--t3:#4a7a8a;
  --card:#0a1628;--card2:#0f1f38;--border:#1a3a5c;
  --glow-c:0 0 20px #00f5ff44,0 0 40px #00f5ff22;
  --glow-p:0 0 20px #ff006e44;
  --r:8px;--r2:12px;
  --fh:'Orbitron',monospace;--fb:'Rajdhani',sans-serif;--fm:'Share Tech Mono',monospace;
  --sw:220px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t1);font-family:var(--fb);font-size:15px;min-height:100vh;overflow-x:hidden}
img{max-width:100%;height:auto}
*{word-break:break-word}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--cyan);border-radius:3px}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(rgba(0,245,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,245,255,.06),transparent 70%);pointer-events:none;z-index:0}
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.par{position:absolute;width:2px;height:2px;background:var(--cyan);border-radius:50%;animation:floatUp linear infinite;opacity:0}
@keyframes floatUp{0%{transform:translateY(100vh) translateX(0);opacity:0}10%{opacity:.5}90%{opacity:.3}100%{transform:translateY(-10px) translateX(var(--dx));opacity:0}}
#app{position:relative;z-index:1;display:none;min-height:100vh}

/* ── LOGIN ── */
#loginPage{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:16px;overflow-y:auto}
.login-wrap{width:100%;max-width:400px;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-logo{text-align:center;margin-bottom:20px}
.login-logo i{font-size:36px;color:var(--cyan);filter:drop-shadow(0 0 10px var(--cyan));display:block;margin-bottom:6px}
.login-logo h1{font-family:var(--fh);font-size:24px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-logo p{color:var(--t3);font-size:11px;letter-spacing:3px;margin-top:3px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:22px;box-shadow:var(--glow-c)}
.auth-tabs{display:flex;gap:3px;margin-bottom:18px;background:var(--bg2);border-radius:var(--r);padding:3px}
.auth-tab{flex:1;padding:8px 2px;text-align:center;border-radius:6px;cursor:pointer;font-family:var(--fh);font-size:10px;letter-spacing:1px;color:var(--t3);transition:.2s;border:none;background:none}
.auth-tab.active{background:linear-gradient(135deg,var(--cyan),var(--cyan2));color:#000;font-weight:700}
.auth-panel{display:none}.auth-panel.active{display:block}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;letter-spacing:2px;color:var(--t3);margin-bottom:5px;font-family:var(--fh)}
.fi{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;color:var(--t1);font-family:var(--fb);font-size:14px;outline:none;transition:.2s}
.fi:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,245,255,.1)}
select.fi option{background:var(--bg2)}
textarea.fi{resize:vertical;min-height:70px}
.btn{padding:10px 16px;border:none;border-radius:var(--r);cursor:pointer;font-family:var(--fh);font-size:10px;letter-spacing:1.5px;font-weight:700;transition:.2s;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;text-decoration:none}
.btn-block{width:100%}
.btn-cyan{background:linear-gradient(135deg,var(--cyan),var(--cyan2));color:#000}
.btn-cyan:hover{transform:translateY(-1px);box-shadow:var(--glow-c)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--t2)}
.btn-outline:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-danger{background:rgba(255,0,110,.12);border:1px solid rgba(255,0,110,.3);color:var(--pink)}
.btn-danger:hover{background:rgba(255,0,110,.22)}
.btn-sm{padding:7px 12px;font-size:10px;border-radius:6px}
.btn-xs{padding:4px 8px;font-size:9px;border-radius:5px}
.amsg{padding:9px 12px;border-radius:var(--r);font-size:12px;margin-bottom:10px;display:none}
.amsg.err{background:rgba(255,0,110,.1);border:1px solid rgba(255,0,110,.3);color:#ff6ea8}
.amsg.ok{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);color:var(--green)}
.fbs{text-align:center;font-size:11px;color:var(--t3);padding:8px 0 0;display:flex;align-items:center;justify-content:center;gap:5px}

/* ── HEADER ── */
#hdr{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(3,4,10,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:54px;display:flex;align-items:center;padding:0 12px;gap:10px}
.hdr-logo{display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0}
.hdr-logo i{font-size:18px;color:var(--cyan);filter:drop-shadow(0 0 6px var(--cyan))}
.hdr-logo span{font-family:var(--fh);font-size:14px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-search{flex:1;max-width:300px;position:relative;margin:0 8px}
.hdr-search input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:7px 14px 7px 32px;color:var(--t1);font-family:var(--fb);font-size:13px;outline:none;transition:.2s}
.hdr-search input:focus{border-color:var(--cyan)}
.hdr-search i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:11px}
.hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.notif-btn{width:34px;height:34px;background:var(--card);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:13px;position:relative;flex-shrink:0;transition:.2s}
.notif-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.ndot{width:7px;height:7px;background:var(--pink);border-radius:50%;position:absolute;top:5px;right:5px;display:none}
.uchip{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 10px 4px 4px;cursor:pointer;transition:.2s}
.uchip:hover{border-color:var(--cyan)}
.uav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000;flex-shrink:0;overflow:hidden;background:linear-gradient(135deg,var(--cyan),var(--pink))}
.uav img{width:100%;height:100%;object-fit:cover}
.uname{font-size:10px;font-family:var(--fh);letter-spacing:1px;color:var(--t1);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ham{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;flex-shrink:0}
.ham span{width:20px;height:2px;background:var(--t2);border-radius:2px;display:block;transition:.3s}

/* ── LAYOUT ── */
#layout{display:flex;padding-top:54px;min-height:100vh}
#sb{width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:54px;bottom:0;left:0;overflow-y:auto;transition:left .3s;z-index:40;display:flex;flex-direction:column}
#sb::-webkit-scrollbar{width:3px}
.sb-sec{padding:13px 12px 5px;font-size:9px;letter-spacing:3px;color:var(--t3);font-family:var(--fh)}
.ni{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:var(--r);cursor:pointer;color:var(--t2);transition:.2s;margin:1px 6px;font-size:14px;font-weight:500;position:relative;border:1px solid transparent}
.ni:hover{background:var(--card);color:var(--cyan)}
.ni.active{background:linear-gradient(135deg,rgba(0,245,255,.12),rgba(0,245,255,.05));color:var(--cyan);border-color:rgba(0,245,255,.2)}
.ni i{width:16px;text-align:center;font-size:13px;flex-shrink:0}
.nbadge{margin-left:auto;background:var(--pink);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;font-family:var(--fh)}
.sb-bot{margin-top:auto;padding:10px 6px;border-top:1px solid var(--border)}
.sb-ov{display:none;position:fixed;inset:0;z-index:39;background:rgba(0,0,0,.6)}

/* ── MAIN ── */
#main{flex:1;margin-left:var(--sw);padding:20px;min-height:calc(100vh - 54px);width:calc(100% - var(--sw));overflow-x:hidden}
.phdr{margin-bottom:20px}
.phdr h2{font-family:var(--fh);font-size:18px;font-weight:900;letter-spacing:2px}
.phdr p{color:var(--t3);font-size:13px;margin-top:3px}
.cline{width:36px;height:3px;background:linear-gradient(90deg,var(--cyan),transparent);border-radius:2px;margin-top:7px}

/* ── STAT CARDS ── */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:20px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px;position:relative;overflow:hidden;transition:.2s}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc.cy::before{background:linear-gradient(90deg,var(--cyan),transparent)}
.sc.pk::before{background:linear-gradient(90deg,var(--pink),transparent)}
.sc.yw::before{background:linear-gradient(90deg,var(--yellow),transparent)}
.sc.gr::before{background:linear-gradient(90deg,var(--green),transparent)}
.sc:hover{transform:translateY(-2px)}
.sc-ico{font-size:20px;margin-bottom:8px}
.sc.cy .sc-ico{color:var(--cyan)}.sc.pk .sc-ico{color:var(--pink)}.sc.yw .sc-ico{color:var(--yellow)}.sc.gr .sc-ico{color:var(--green)}
.sc-val{font-family:var(--fh);font-size:22px;font-weight:900}
.sc-lbl{font-size:9px;color:var(--t3);letter-spacing:1px;margin-top:2px}

/* ── GAME CARDS ── */
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:13px}
.gc{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:.25s;position:relative}
.gc:hover{transform:translateY(-3px);border-color:var(--cyan);box-shadow:var(--glow-c)}
.gthumb{width:100%;height:115px;object-fit:cover;display:block;background:var(--bg3)}
.gph{width:100%;height:115px;background:linear-gradient(135deg,var(--bg2),var(--card2));display:flex;align-items:center;justify-content:center;font-size:30px;color:var(--t3)}
.gbadge{position:absolute;top:7px;right:7px;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:1px;font-family:var(--fh)}
.bn{background:var(--green);color:#000}.bh{background:var(--pink);color:#fff}.bt{background:var(--yellow);color:#000}
.gi{padding:10px}
.gt{font-family:var(--fh);font-size:11px;font-weight:700;letter-spacing:1px;color:var(--t1);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gm{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--t3)}
.gct{font-size:9px;background:rgba(0,245,255,.1);color:var(--cyan);padding:2px 6px;border-radius:4px;border:1px solid rgba(0,245,255,.2)}

/* ── GAME DETAIL ── */
.gdh{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:18px}
.gdhi{width:100%;height:190px;object-fit:cover;background:var(--bg3);display:block}
.gdhp{width:100%;height:190px;background:linear-gradient(135deg,var(--bg2),var(--card2));display:flex;align-items:center;justify-content:center;font-size:52px;color:var(--t3)}
.gdinfo{padding:16px}
.gdtitle{font-family:var(--fh);font-size:17px;font-weight:900;letter-spacing:2px;margin-bottom:9px}
.gdmeta{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:12px}
.mchip{display:flex;align-items:center;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--t2)}
.mchip i{color:var(--cyan);font-size:10px}
.gdesc{color:var(--t2);font-size:14px;line-height:1.7;margin-bottom:13px}
.pbtn{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,var(--cyan),var(--cyan2));color:#000;padding:11px 22px;border-radius:var(--r);font-family:var(--fh);font-size:11px;letter-spacing:2px;font-weight:700;cursor:pointer;border:none;transition:.2s}
.pbtn:hover{transform:translateY(-2px);box-shadow:var(--glow-c)}
.bbtn{display:inline-flex;align-items:center;gap:6px;color:var(--cyan);cursor:pointer;font-size:13px;margin-bottom:13px;background:none;border:none;padding:0}
.bbtn:hover{text-decoration:underline}

/* ── GAME FRAME ── */
#gframe{display:none;position:fixed;inset:0;z-index:200;background:#000;flex-direction:column}
#gframe.on{display:flex}
.fbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:7px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.ftitle{font-family:var(--fh);font-size:12px;letter-spacing:2px;color:var(--cyan);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fclose{background:var(--pink);color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-family:var(--fh);font-size:10px;letter-spacing:1px;flex-shrink:0}
#gif{flex:1;width:100%;border:none;background:#000}

/* ── TABLES ── */
.tbwrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbwrap table{min-width:480px}
.lbt{width:100%;border-collapse:collapse}
.lbt th{background:var(--bg2);padding:9px 12px;text-align:left;font-family:var(--fh);font-size:9px;letter-spacing:2px;color:var(--t3);border-bottom:1px solid var(--border)}
.lbt td{padding:9px 12px;border-bottom:1px solid rgba(26,58,92,.4);font-size:13px;color:var(--t2)}
.lbt tr:hover td{background:var(--card2);color:var(--t1)}
.lbr{font-family:var(--fh);font-weight:700;color:var(--cyan)}
.lbr.gd{color:var(--yellow)}.lbr.sl{color:#c0c0c0}.lbr.br{color:#cd7f32}
.avs{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#000;margin-right:6px;vertical-align:middle;flex-shrink:0;overflow:hidden;background:linear-gradient(135deg,var(--cyan),var(--pink))}
.avs img{width:100%;height:100%;object-fit:cover}

/* ── PROFILE ── */
.phdr-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:18px;display:flex;align-items:flex-start;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.avwrap{position:relative;flex-shrink:0}
.pav{width:64px;height:64px;background:linear-gradient(135deg,var(--cyan),var(--pink));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#000;border:2px solid var(--cyan);box-shadow:var(--glow-c);overflow:hidden}
.pav img{width:100%;height:100%;object-fit:cover}
.av-edit{position:absolute;bottom:0;right:0;width:20px;height:20px;background:var(--cyan);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:9px;color:#000;border:2px solid var(--bg)}
.pname{font-family:var(--fh);font-size:16px;font-weight:900;letter-spacing:2px}
.prole{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:1px;font-family:var(--fh);margin-top:4px}
.ra{background:rgba(255,0,110,.15);border:1px solid rgba(255,0,110,.3);color:var(--pink)}
.rp{background:rgba(0,245,255,.1);border:1px solid rgba(0,245,255,.2);color:var(--cyan)}
.xpbar{background:var(--bg2);border-radius:4px;height:6px;overflow:hidden;margin:5px 0}
.xpfill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--pink));border-radius:4px;transition:.6s}
.bgrid{display:flex;flex-wrap:wrap;gap:8px}
.bi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:9px 13px;display:flex;align-items:center;gap:8px;font-size:12px}
.bi.lk{opacity:.35;filter:grayscale(1)}

/* ── CHALLENGE ── */
.chcard{background:linear-gradient(135deg,rgba(255,230,0,.08),rgba(255,0,110,.06));border:1px solid rgba(255,230,0,.2);border-radius:var(--r2);padding:16px;margin-bottom:16px}
.chtitle{font-family:var(--fh);font-size:12px;letter-spacing:2px;color:var(--yellow);margin-bottom:5px}
.chbar{background:var(--bg2);border-radius:4px;height:5px;overflow:hidden;margin:8px 0 5px}
.chfill{height:100%;background:linear-gradient(90deg,var(--yellow),var(--pink));border-radius:4px;transition:.5s}
.cdown{font-family:var(--fm);color:var(--yellow);font-size:11px}

/* ── COMMENTS ── */
.cmtbox{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:8px}
.cmthdr{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.cmtu{font-family:var(--fh);font-size:10px;color:var(--cyan);letter-spacing:1px}
.cmtt{font-size:10px;color:var(--t3);margin-right:auto}
.cmtxt{font-size:13px;color:var(--t2);line-height:1.5;word-break:break-word}

/* ── STARS ── */
.stars{display:flex;gap:3px}
.stars i{color:var(--t3);cursor:pointer;font-size:18px;transition:.1s}
.stars i.on{color:var(--yellow)}
.stars.ro i{cursor:default}

/* ── MODAL ── */
#modal{display:none;position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:14px;overflow-y:auto}
#modal.on{display:flex}
.mbox{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:var(--glow-c);margin:auto}
.mhdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:1}
.mhdr h3{font-family:var(--fh);font-size:12px;letter-spacing:2px;color:var(--cyan)}
.mclose{background:none;border:none;color:var(--t3);font-size:16px;cursor:pointer;padding:0}
.mclose:hover{color:var(--pink)}
.mbody{padding:16px}
.mfoot{padding:11px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}

/* ── TOASTS ── */
#toasts{position:fixed;top:60px;right:10px;z-index:300;display:flex;flex-direction:column;gap:6px;pointer-events:none;max-width:260px}
.toast{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:9px 13px;font-size:12px;display:flex;align-items:center;gap:8px;animation:tin .3s ease;pointer-events:auto;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.success{border-color:rgba(0,255,136,.4);color:var(--green)}
.toast.error{border-color:rgba(255,0,110,.4);color:#ff6ea8}
.toast.info{border-color:rgba(0,245,255,.3);color:var(--cyan)}
.toast.warn{border-color:rgba(255,230,0,.3);color:var(--yellow)}
.toast.fade{animation:tout .3s ease forwards}
@keyframes tin{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
@keyframes tout{to{opacity:0;transform:translateX(14px)}}

/* ── NOTIF ── */
#nPanel{display:none;position:fixed;top:57px;right:10px;width:270px;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);z-index:80;box-shadow:0 8px 32px rgba(0,0,0,.6);max-height:340px;overflow-y:auto}
#nPanel.on{display:block}

// ═══ FIREBASE ═══
function initFB(){
  if(!USE_FB){_fbr=true;loadLoc();trySession();return;}
  try{
    if(!firebase.apps.length)firebase.initializeApp(FBC);
    _ref=firebase.database().ref('hypernova');
    _ref.once('value',snap=>{
      _fbr=true;
      const d=snap.val();
      if(d)applyDB(d);else pushDB();
      setFBS(true);
      if(!S.user)trySession();else rerender();
    });
    let _fbDebounce=null;
    _ref.on('value',snap=>{
      if(_own){_own=false;return;}
      const d=snap.val();
      if(d&&_fbr){
        clearTimeout(_fbDebounce);

          applyDB(d);

}

function applyDB(d){
  // Restore local photos first
  restoreLocalPhotos(d);
  if(d.users&&Array.isArray(d.users)&&d.users.length>0){
    const ids=d.users.map(u=>u.id);
    DB.users=[...d.users,...DB.users.filter(u=>!ids.includes(u.id))];
  }
  if(d.games&&Array.isArray(d.games)){
    const gids=d.games.map(g=>g.id);
    DB.games=[...d.games,...DB.games.filter(g=>!gids.includes(g.id))];
    DB.games.forEach(g=>{if(!g.htmlContent){const h=getLocal('hn_h'+g.id);if(h)g.htmlContent=h;}});
  }
  if(d.categories)DB.categories=d.categories;
  if(d.announcements)DB.announcements=d.announcements;
  if(d.about){DB.about={devPhoto:'',devName:'Harsh Lalka',devRole:'Founder & Lead Developer',devBio:'',...d.about};}
  if(d.contact)DB.contact=d.contact;
  if(d.settings){
    DB.settings=d.settings;
    // Restore GitHub token from Firebase
    if(d.settings.githubToken&&d.settings.githubToken!==''){
      window.GITHUB_TOKEN=d.settings.githubToken;
    }
  }
  // Sync current user's data
  if(S.user){const fresh=DB.users.find(x=>x.id===S.user.id);if(fresh){S.user=fresh;sSet(fresh);renderHdr();}}
  updBadge();
}

// Save large base64 data to localStorage only (not Firebase)
function storeLocal(key,val){try{if(val)localStorage.setItem(key,val);}catch(e){}}
function getLocal(key){try{return localStorage.getItem(key)||'';}catch(e){return '';}}

function snap(forFirebase){
  const c=JSON.parse(JSON.stringify({
    users:DB.users,games:DB.games,categories:DB.categories,
    announcements:DB.announcements,about:DB.about,contact:DB.contact,settings:DB.settings
  }));
  // Game HTML files — always store locally
  c.games.forEach(g=>{
    if(g.htmlContent){storeLocal('hn_h'+g.id,g.htmlContent);delete g.htmlContent;}
    if(forFirebase&&g.thumb&&g.thumb.startsWith('data:')){
      storeLocal('hn_th'+g.id,g.thumb);
      g.thumb='__local_th'+g.id+'__';
    }
  });
  if(forFirebase){
    // Strip base64 photos from Firebase (too large) — store locally instead
    c.users.forEach(u=>{
      if(u.avatar&&u.avatar.startsWith('data:')){
        try{localStorage.setItem('hn_av_'+u.id,u.avatar);}catch(e){}
        u.avatar='__local__'+u.id; // marker so we know to load from localStorage
      }
    });
    if(c.about){
      if(c.about.photo&&c.about.photo.startsWith('data:')){
        storeLocal('hn_abp',c.about.photo);c.about.photo='__local_abp__';
      }
      if(c.about.devPhoto&&c.about.devPhoto.startsWith('data:')){
        storeLocal('hn_devp',c.about.devPhoto);c.about.devPhoto='__local_devp__';
      }
    }
  }
  return c;
}

function restoreLocalPhotos(d){
  // Restore base64 photos from localStorage after loading from Firebase
  if(d.users){
    d.users.forEach(u=>{
      if(u.avatar&&u.avatar.startsWith('__local__')){
        u.avatar=localStorage.getItem('hn_av_'+u.id)||'';
      } else if(u.avatar&&u.avatar.startsWith('data:')){
        try{localStorage.setItem('hn_av_'+u.id,u.avatar);}catch(e){}
      }
    });
  }
  if(d.about){
    if(d.about.photo==='__local_abp__') d.about.photo=getLocal('hn_abp');
    else if(d.about.photo&&d.about.photo.startsWith('data:')) storeLocal('hn_abp',d.about.photo);
    if(d.about.devPhoto==='__local_devp__') d.about.devPhoto=getLocal('hn_devp');
    else if(d.about.devPhoto&&d.about.devPhoto.startsWith('data:')) storeLocal('hn_devp',d.about.devPhoto);
  }
  if(d.games&&Array.isArray(d.games)){
    d.games.forEach(g=>{
      if(g.thumb&&g.thumb.startsWith('__local_th')){
        const id=g.thumb.replace('__local_th','').replace('__','');
        g.thumb=getLocal('hn_th'+id)||'';
      } else if(g.thumb&&g.thumb.startsWith('data:')){
        storeLocal('hn_th'+g.id,g.thumb);
      }
    });
  }
}

// ── GITHUB UPLOAD ──
async function uploadToGitHub(path, content, isBase64){
  if(window.GITHUB_TOKEN==='YOUR_GITHUB_TOKEN'){
    toast('warn','fa-triangle-exclamation','Set GitHub Token first!');
    return null;
  }
  try{
    // Check if file exists (to get SHA for update)
    let sha = null;
    try{
      const check = await fetch(`${GITHUB_API}/${path}`,{
        headers:{'Authorization':'token '+window.GITHUB_TOKEN,'Accept':'application/vnd.github.v3+json'}
      });
      if(check.ok){const d=await check.json();sha=d.sha;}
    }catch(e){}

    const body = {
      message:`Upload ${path}`,
      content: isBase64 ? content : btoa(unescape(encodeURIComponent(content))),
    };
    if(sha) body.sha = sha;

    const res = await fetch(`${GITHUB_API}/${path}`,{
      method:'PUT',
      headers:{
        'Authorization':'token '+window.GITHUB_TOKEN,
        'Accept':'application/vnd.github.v3+json',
        'Content-Type':'application/json'
      },
      body: JSON.stringify(body)
    });

    if(res.ok){
      const d = await res.json();
      return d.content.download_url || `${GITHUB_RAW}/${path}`;
    }else{
      const err = await res.json();
      toast('error','fa-xmark','Upload failed: '+err.message);
      return null;
    }
  }catch(e){
    toast('error','fa-xmark','Upload error: '+e.message);
    return null;
  }
}

// Convert file to base64 for GitHub upload
function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>{
      // Remove data:...;base64, prefix
      const b64=e.target.result.split(',')[1];
      res(b64);
    };
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

function saveDB(){
  // Full data (with photos) saved locally
  try{localStorage.setItem('hn_db',JSON.stringify(snap(false)));}catch(e){
    // localStorage full — try without avatars
    try{localStorage.setItem('hn_db',JSON.stringify(snap(true)));}catch(e2){}
  }
  if(!USE_FB||!_ref)return;
  // Firebase gets data WITHOUT base64 photos (stripped to markers)
  _own=true;
  _ref.set(snap(true)).catch(e=>{_own=false;toast('error','fa-triangle-exclamation','Save failed: '+e.message);});
}

function pushDB(){if(_ref)_ref.set(snap());}
function loadLoc(){
  try{
    const r=localStorage.getItem('hn_db');
    if(r){
      const d=JSON.parse(r);
      restoreLocalPhotos(d);
      applyDB(d);
      // Load GitHub token from local cache (Firebase will override on connect)
      if(d.settings&&d.settings.githubToken&&d.settings.githubToken!==''){
        window.GITHUB_TOKEN=d.settings.githubToken;
      }
    }
  }catch(e){}
}

function sSet(u){localStorage.setItem(SK,JSON.stringify({id:u.id,role:u.role}));}
function sClear(){localStorage.removeItem(SK);localStorage.removeItem(PK);}
function sGet(){
  try{
    const s=JSON.parse(localStorage.getItem(SK)||'null');
    if(!s)return false;

function doLogin(){

  hideM('lerr');
  if(!u||!p){showErr('lerr','Fill all fields.');return;}
  if(USE_FB&&!_fbr){showErr('lerr','Connecting... please wait.');return;}
  const found=DB.users.find(x=>x.username===u&&x.password===p&&x.role===role);
  if(!found){showErr('lerr','Invalid credentials.');return;}
  if(found.locked){showErr('lerr','Account locked by admin.');return;}
  S.user=found;sSet(found);
  ge('loginPage').style.display='none';ge('app').style.display='block';
  initApp(false);toast('success','fa-bolt-lightning','Welcome, '+found.name+'!');
  grantBadgeNoSave(found,'first_login');saveDB();

function doRegister(){
  const name=v('rname'),uname=v('ruser'),pass=v('rpass'),pass2=v('rpass2');
  hideM('rerr');hideM('rok');
  if(!name||!uname||!pass||!pass2){showErr('rerr','Fill all fields.');return;}
  if(pass.length<6){showErr('rerr','Password min 6 chars.');return;}
  if(pass!==pass2){showErr('rerr','Passwords do not match.');return;}
  if(DB.users.find(x=>x.username===uname)){showErr('rerr','Username taken.');return;}
  const nu={id:Date.now(),name,username:uname,password:pass,role:'player',xp:0,level:1,badges:[],locked:false,avatar:'',gamesPlayed:0,createdAt:Date.now()};
  DB.users.push(nu);saveDB();
  showOk('rok','Account created! Login now.');
  setTimeout(()=>switchTab('login'),1500);
}

function doForgot(){
  const uname=v('fuser'),pass=v('fpass'),pass2=v('fpass2');
  hideM('ferr');hideM('fok');
  if(!uname||!pass||!pass2){showErr('ferr','Fill all fields.');return;}
  if(pass!==pass2){showErr('ferr','Passwords do not match.');return;}
  const u=DB.users.find(x=>x.username===uname&&x.role==='player');

  u.password=pass;saveDB();

function changeAvatar(){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    const u=S.user;
  
    if(tokenOk){
      // Upload to GitHub — works on ALL devices
      toast('info','fa-circle-notch fa-spin','Uploading photo...');
      const safeName=(u.username||'user').replace(/[^a-zA-Z0-9]/g,'_').toLowerCase();
      const ext=file.name.split('.').pop()||'jpg';
      const path=`images/avatar_${safeName}.${ext}`;
      const b64=await fileToBase64(file);
      const url=await uploadToGitHub(path,b64,true);
      if(url){
        u.avatar=url;
        const du=DB.users.find(x=>x.id===u.id);if(du)du.avatar=url;
        saveDB();sSet(u);renderHdr();rProfile();
        toast('success','fa-check','Photo updated! Visible on all devices ✅');
      }
    } else {
      // No token — save to localStorage (this device only)
      const r=new FileReader();
      r.onload=ev=>{
        const b64=ev.target.result;
        u.avatar=b64;
        const du=DB.users.find(x=>x.id===u.id);if(du)du.avatar=b64;
        try{localStorage.setItem('hn_av_'+u.id,b64);}catch(e){}
        saveDB();sSet(u);renderHdr();rProfile();
        toast('warn','fa-triangle-exclamation','Photo saved on this device only. Set GitHub token for all devices.');
      };
      r.readAsDataURL(file);
    }
  };inp.click();
}

function saveProfile(){
  const u=S.user,isA=u.role==='admin';
  const name=ge('pName')?.value.trim(),pass=ge('pPass')?.value.trim();
  if(isA){
    const cur=ge('pCur')?.value.trim(),newU=ge('pUser')?.value.trim();
    if((pass||newU!==u.username)&&cur!==u.password){toast('error','fa-xmark','Current password wrong!');return;}
    if(newU&&newU!==u.username){
      if(DB.users.find(x=>x.username===newU&&x.id!==u.id)){toast('error','fa-xmark','Username taken!');return;}
      u.username=newU;
    }
  }
  if(name)u.name=name;
  if(pass){if(pass.length<6){toast('error','fa-xmark','Password too short!');return;}u.password=pass;}
  const du=DB.users.find(x=>x.id===u.id);if(du)Object.assign(du,u);
  if(u.avatar&&u.avatar.startsWith('data:'))storeLocal('hn_av'+u.id,u.avatar);
  sSet(u);saveDB();renderHdr();rProfile();
  toast('success','fa-check','Profile saved!');
}

function rGameDetail(gid){
  const el=ge('pc');
  const n=parseInt(gid);
  const g=DB.games.find(x=>x.id===n||x.id==gid);
  if(!g){
    if(USE_FB&&!_fbr){
      el.innerHTML=`<div style="text-align:center;padding:60px 14px;color:var(--t3)"><i class="fa-solid fa-circle-notch fa-spin" style="font-size:30px;color:var(--cyan);display:block;margin-bottom:12px"></i><p>Loading...</p></div>`;
      setTimeout(()=>{const g2=DB.games.find(x=>x.id===n||x.id==gid);if(g2){el.innerHTML='';rGameDetail(gid);}else{el.innerHTML=`<div class="empty"><i class="fa-solid fa-gamepad"></i><p>Game not found.</p></div>`;}},4000);
      return;
    }
    el.innerHTML=`<div class="empty"><i class="fa-solid fa-gamepad"></i><p>Game not found.</p></div>`;return;
  }
  const isA=S.user?.role==='admin';

function setGHToken(){
  const t=ge('ghTokenIn')?.value.trim();
  if(!t||!t.startsWith('ghp_')){toast('error','fa-xmark','Invalid token! Must start with ghp_');return;}
  // Save to Firebase permanently — works on ALL devices
  if(!DB.settings)DB.settings={};
  DB.settings.githubToken=t;
  window.GITHUB_TOKEN=t;
  saveDB();
  toast('success','fa-check','Token saved permanently! ✅ All devices ready.');
  rAdmin();
}

function clearGHToken(){
  if(!DB.settings)DB.settings={};
  DB.settings.githubToken='';
  window.GITHUB_TOKEN='YOUR_GITHUB_TOKEN';
  saveDB();
  toast('info','fa-trash','GitHub token removed.');
  rAdmin();
}

function saveAbout(){
  const url=ge('abUrl')?.value.trim();
  const txt=ge('abTxt')?.value.trim();
  const file=ge('abFile')?.files[0];
  const devUrl=ge('devPhotoUrl')?.value.trim();
  const devFile=ge('devPhotoFile')?.files[0];
  const devName=ge('devName')?.value.trim()||DB.about?.devName||'Harsh Lalka';
  const devRole=ge('devRole')?.value.trim()||DB.about?.devRole||'Founder & Lead Developer';
  const devBio=ge('devBio')?.value.trim()||DB.about?.devBio||'';

  toast('info','fa-circle-notch fa-spin','Saving...');

  const doSave=async()=>{
    let mainPhoto=url||DB.about?.photo||'';
    let devPhoto=devUrl||DB.about?.devPhoto||'';

    if(file){
      const b64=await fileToBase64(file);
      const ext=file.name.split('.').pop()||'jpg';
      const uploaded=await uploadToGitHub(`images/about_banner.${ext}`,b64,true);
      if(uploaded)mainPhoto=uploaded;
    }
    if(devFile){
      const b64=await fileToBase64(devFile);
      const ext=devFile.name.split('.').pop()||'jpg';
      const uploaded=await uploadToGitHub(`images/dev_photo.${ext}`,b64,true);
      if(uploaded)devPhoto=uploaded;
    }

    DB.about={photo:mainPhoto,text:txt||DB.about?.text||'',devPhoto,devName,devRole,devBio};
    saveDB();rAbout();toast('success','fa-check','About saved! ✅');
  };

  doSave();
}

function saveGame(gid){
  const title=ge('gT')?.value.trim();
  if(!title){toast('error','fa-xmark','Title required!');return;}
  const data={title,category:ge('gC')?.value||'',description:ge('gD')?.value.trim()||'',thumb:ge('gThU')?.value.trim()||'',badge:ge('gB')?.value||'',url:ge('gU')?.value.trim()||''};
  const thFile=ge('gThF')?.files[0],gFile=ge('gF')?.files[0];

  // Keep existing data if editing
  if(gid){
    const g=DB.games.find(x=>x.id===gid);
    if(g){
      if(!data.thumb)data.thumb=g.thumb||'';
      if(!data.url)data.url=g.url||'';
      data.gameUrl=g.gameUrl||''; // existing game URL
    }
  }

  toast('info','fa-circle-notch fa-spin','Uploading files...');

  const doUpload=async()=>{
    // Upload thumbnail to GitHub if file selected
    if(thFile){
      const safeName=title.replace(/[^a-zA-Z0-9]/g,'_').toLowerCase();
      const ext=thFile.name.split('.').pop()||'jpg';
      const path=`images/${safeName}_${Date.now()}.${ext}`;
      const b64=await fileToBase64(thFile);
      const url=await uploadToGitHub(path,b64,true);
      if(url)data.thumb=url;
    }

    // Upload HTML game file to GitHub
    if(gFile){
      const safeName=title.replace(/[^a-zA-Z0-9]/g,'_').toLowerCase();
      const path=`games/${safeName}_${Date.now()}.html`;
      const text=await gFile.text();
      const url=await uploadToGitHub(path,text,false);
      if(url){data.gameUrl=url;data.htmlContent='';}// store URL not content
    } else if(gid){
      const g=DB.games.find(x=>x.id===gid);
      if(g)data.gameUrl=g.gameUrl||'';
    }

    finalSave(data,gid);
  };

  doUpload();
}

function finalSave(data,gid){
  if(gid){
    const g=DB.games.find(x=>x.id===gid);if(g)Object.assign(g,data);
    // Store thumb locally if base64
    if(data.thumb&&data.thumb.startsWith('data:'))storeLocal('hn_th'+gid,data.thumb);
    saveDB();closeMod();toast('success','fa-check','Game updated!');nav('gamedetail',gid);
  }else{
    data.id=DB.games.length>0?Math.max(...DB.games.map(x=>x.id))+1:1;
    data.plays=0;data.comments=[];data.ratings=[];
    DB.games.push(data);
    if(data.thumb&&data.thumb.startsWith('data:'))storeLocal('hn_th'+data.id,data.thumb);
    saveDB();closeMod();updBadge();
    toast('success','fa-check','Game added!');
    setTimeout(()=>nav('gamedetail',data.id),200);
  }
}

// ═══ PLAY ═══
function playGame(id){
  const g=DB.games.find(x=>x.id===parseInt(id)||x.id==id);
  if(!g){toast('error','fa-xmark','Game not found!');return;}
  g.plays=(g.plays||0)+1;
  const today=new Date().toDateString();
  const sd=JSON.parse(localStorage.getItem(DK)||'{}');
  const prog=(sd.date===today?sd.progress:0)+1;
  localStorage.setItem(DK,JSON.stringify({date:today,progress:prog}));
  // XP logic
  if(prog>=5){
    addXP(S.user,50,true);
    setTimeout(()=>toast('success','fa-fire','Daily Challenge done! +50 XP 🔥'),500);
  }else if(prog===1){addXP(S.user,10,true);}
  else{addXP(S.user,5,true);}
  grantBadgeNoSave(S.user,'first_game');
  // Single save for all changes
  const du=DB.users.find(x=>x.id===S.user.id);if(du)Object.assign(du,S.user);
  saveDB();
  // Launch game — use GitHub URL if available, else local HTML, else game URL
  let src=null;
  if(g.gameUrl&&g.gameUrl.startsWith('http')){
    src=g.gameUrl; // GitHub hosted game
  } else {
    const html=g.htmlContent||localStorage.getItem('hn_h'+g.id);
    if(html){
      const objUrl=URL.createObjectURL(new Blob([html],{type:'text/html'}));
      window._lastObjUrl=objUrl;
      src=objUrl;
    } else {
      src=g.url||null;
    }
  }
  if(!src){toast('error','fa-xmark','No game file uploaded!');return;}
  ge('ftitle').textContent=g.title.toUpperCase();
  ge('gif').src=src;
  ge('gframe').classList.add('on');
}
function closeGame(){ge('gframe').classList.remove('on');ge('gif').src='';}

// ═══ XP & BADGES ═══
function addXP(u,amt,isPlay){
  if(!u||!amt)return;
  u.xp=(u.xp||0)+amt;
  const prevLevel=u.level||1;
  u.level=Math.floor(u.xp/100)+1;
  if(isPlay) u.gamesPlayed=(u.gamesPlayed||0)+1;
  // Level 3 bonus — only once
  if(u.level>=3&&prevLevel<3){
    u.xp+=100;u.level=Math.floor(u.xp/100)+1;
    setTimeout(()=>toast('success','fa-trophy','Level 3! +100 XP Bonus 🎉'),400);
  }
  const du=DB.users.find(x=>x.id===u.id);if(du)Object.assign(du,u);
  sSet(u);
  // Batch save — don't call saveDB here, caller will save
  toast('info','fa-star',`+${amt} XP!`);
  // Badge checks (no saveDB inside grantBadge to avoid double save)
  if(isPlay){
    if(u.gamesPlayed>=10)grantBadgeNoSave(u,'plays10');
    if(u.gamesPlayed>=50)grantBadgeNoSave(u,'plays50');
  }
  if(u.level>=3)grantBadgeNoSave(u,'lvl5');
}
function grantBadge(u,b){
  if(!u||!b)return;if(!u.badges)u.badges=[];if(u.badges.includes(b))return;
  u.badges.push(b);const du=DB.users.find(x=>x.id===u.id);if(du)du.badges=[...u.badges];
  sSet(u);saveDB();setTimeout(()=>toast('success','fa-shield-halved','Badge unlocked! 🏅'),200);
}
function grantBadgeNoSave(u,b){
  if(!u||!b)return;if(!u.badges)u.badges=[];if(u.badges.includes(b))return;
  u.badges.push(b);const du=DB.users.find(x=>x.id===u.id);if(du)du.badges=[...u.badges];
  sSet(u);setTimeout(()=>toast('success','fa-shield-halved','Badge unlocked! 🏅'),300);
}

function gcard(g){
  const th=g.thumb?`<img class="gthumb" src="${g.thumb}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="gph" style="display:none">${cIcon(g.category)}</div>`:`<div class="gph">${cIcon(g.category)}</div>`;
  return`<div class="gc" onclick="nav('gamedetail',${g.id})">${th}${g.badge?`<span class="gbadge b${g.badge.toLowerCase()}">${g.badge}</span>`:''}
    <div class="gi"><div class="gt">${g.title}</div><div class="gm"><span class="gct">${g.category||'Game'}</span><span class="flex gap6 aic"><i class="fa-solid fa-fire pk" style="font-size:9px"></i>${g.plays||0}</span></div></div></div>`;
}
function cIcon(c){return({Action:'⚔️',Adventure:'🗺️',Puzzle:'🧩',Racing:'🏎️',Sports:'⚽',Strategy:'♟️',Arcade:'🕹️',RPG:'🐉'})[c]||'🎮';}
function timeAgo(ts){const d=Date.now()-ts;if(d<60000)return'just now';if(d<3600000)return Math.floor(d/60000)+'m ago';if(d<86400000)return Math.floor(d/3600000)+'h ago';return Math.floor(d/86400000)+'d ago';}
function pad(n){return String(n).padStart(2,'0');}

// ═══ BACK BUTTON ═══
window.addEventListener('popstate',e=>{
  if(!S.user)return;
  const hash=window.location.hash.replace('#','');
  if(!hash){navigate('home');return;}
  const p=hash.split('/');navigate(p[0]||'home',p[1]||null);
});

// ═══ PARTICLES ═══
function initPar(){
  const c=ge('particles');
  for(let i=0;i<20;i++){const p=document.createElement('div');p.className='par';p.style.cssText=`left:${Math.random()*100}%;animation-duration:${7+Math.random()*10}s;animation-delay:${Math.random()*10}s;--dx:${(Math.random()-.5)*80}px`;c.appendChild(p);}
}

// ═══ BOOT ═══
document.addEventListener('DOMContentLoaded',()=>{
  initPar();
  // Auth tabs
  document.querySelectorAll('.auth-tab').forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab)));
  // Enter keys
  ['luser','lpass'].forEach(id=>ge(id)?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();}));
  ['rname','ruser','rpass','rpass2'].forEach(id=>ge(id)?.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister();}));
  ['fuser','fpass','fpass2'].forEach(id=>ge(id)?.addEventListener('keydown',e=>{if(e.key==='Enter')doForgot();}));
  // Outside clicks
  document.addEventListener('click',e=>{
    if(!e.target.closest('#nPanel')&&!e.target.closest('.notif-btn'))ge('nPanel').classList.remove('on');
  });
  ge('modal').addEventListener('click',e=>{if(e.target===ge('modal'))closeMod();});
  // Boot
  loadLoc();
  if(sGet()){ge('loginPage').style.display='none';ge('app').style.display='block';initApp(true);}
  initFB();
});
</script>
