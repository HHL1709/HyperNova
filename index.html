<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HyperNova — Next-Gen Gaming Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{
  --bg:#03040a;--bg2:#070c14;--bg3:#0d1526;
  --cyan:#00f5ff;--pink:#ff006e;--yellow:#ffe600;--green:#00ff88;
  --cyan2:#00c8d4;--pink2:#cc0057;
  --t1:#e8f4f8;--t2:#8ab4c8;--t3:#4a7a8a;
  --card:#0a1628;--card2:#0f1f38;--border:#1a3a5c;
  --glow-c:0 0 20px #00f5ff44,0 0 40px #00f5ff22;
  --glow-p:0 0 20px #ff006e44,0 0 40px #ff006e22;
  --r:8px;--r2:12px;
  --font-head:'Orbitron',monospace;
  --font-body:'Rajdhani',sans-serif;
  --font-mono:'Share Tech Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t1);font-family:var(--font-body);font-size:15px;min-height:100vh;overflow-x:hidden}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--cyan);border-radius:3px}

/* ═══ GRID BG ═══ */
body::before{content:'';position:fixed;inset:0;background:
  linear-gradient(rgba(0,245,255,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,245,255,.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,245,255,.06),transparent 70%);pointer-events:none;z-index:0}

/* ═══ PARTICLES ═══ */
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.par{position:absolute;width:2px;height:2px;background:var(--cyan);border-radius:50%;animation:float linear infinite;opacity:0}
@keyframes float{0%{transform:translateY(100vh) translateX(0);opacity:0}10%{opacity:.6}90%{opacity:.4}100%{transform:translateY(-10px) translateX(var(--dx));opacity:0}}

/* ═══ APP WRAPPER ═══ */
#app{position:relative;z-index:1;display:none;min-height:100vh}

/* ═══ LOGIN PAGE ═══ */
#loginPage{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.login-wrap{width:100%;max-width:420px;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .logo-icon{font-size:42px;color:var(--cyan);filter:drop-shadow(0 0 12px var(--cyan));display:block;margin-bottom:8px}
.login-logo h1{font-family:var(--font-head);font-size:28px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-logo p{color:var(--t3);font-size:12px;letter-spacing:3px;margin-top:4px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:28px;box-shadow:var(--glow-c)}
.auth-tabs{display:flex;gap:4px;margin-bottom:22px;background:var(--bg2);border-radius:var(--r);padding:4px}
.auth-tab{flex:1;padding:9px;text-align:center;border-radius:6px;cursor:pointer;font-family:var(--font-head);font-size:11px;letter-spacing:1px;color:var(--t3);transition:.2s;border:none;background:none}
.auth-tab.active{background:linear-gradient(135deg,var(--cyan),var(--cyan2));color:#000;font-weight:700}
.auth-panel{display:none}.auth-panel.active{display:block}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;letter-spacing:2px;color:var(--t3);margin-bottom:6px;font-family:var(--font-head)}
.field input,.field select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;color:var(--t1);font-family:var(--font-body);font-size:14px;outline:none;transition:.2s}
.field input:focus,.field select:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,245,255,.1)}
.field select option{background:var(--bg2)}
.btn{width:100%;padding:12px;border:none;border-radius:var(--r);cursor:pointer;font-family:var(--font-head);font-size:12px;letter-spacing:2px;font-weight:700;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-cyan{background:linear-gradient(135deg,var(--cyan),var(--cyan2));color:#000}
.btn-cyan:hover{transform:translateY(-1px);box-shadow:var(--glow-c)}
.btn-pink{background:linear-gradient(135deg,var(--pink),var(--pink2));color:#fff}
.btn-pink:hover{transform:translateY(-1px);box-shadow:var(--glow-p)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--t2)}
.btn-outline:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-sm{padding:7px 14px;font-size:10px;width:auto;border-radius:6px}
.auth-msg{padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:12px;display:none}
.auth-msg.error{background:rgba(255,0,110,.1);border:1px solid rgba(255,0,110,.3);color:#ff6ea8}
.auth-msg.success{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);color:var(--green)}
.auth-link{text-align:center;margin-top:14px;font-size:12px;color:var(--t3)}
.auth-link span{color:var(--cyan);cursor:pointer}
.auth-link span:hover{text-decoration:underline}
.fb-status{text-align:center;font-size:11px;color:var(--t3);padding:8px 0 0;display:flex;align-items:center;justify-content:center;gap:6px}

/* ═══ HEADER ═══ */
#header{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(3,4,10,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:58px;display:flex;align-items:center;padding:0 20px;gap:14px}
.header-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.header-logo i{font-size:20px;color:var(--cyan);filter:drop-shadow(0 0 6px var(--cyan))}
.header-logo span{font-family:var(--font-head);font-size:16px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-search{flex:1;max-width:360px;position:relative;margin:0 auto}
.header-search input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:8px 16px 8px 38px;color:var(--t1);font-family:var(--font-body);font-size:13px;outline:none;transition:.2s}
.header-search input:focus{border-color:var(--cyan)}
.header-search i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px}
.header-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.notif-btn{width:36px;height:36px;background:var(--card);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:14px;position:relative;transition:.2s}
.notif-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.notif-dot{width:7px;height:7px;background:var(--pink);border-radius:50%;position:absolute;top:6px;right:6px}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 12px 5px 5px;cursor:pointer;transition:.2s}
.user-chip:hover{border-color:var(--cyan)}
.user-avatar{width:26px;height:26px;background:linear-gradient(135deg,var(--cyan),var(--pink));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000}
.user-chip span{font-size:12px;font-family:var(--font-head);letter-spacing:1px;color:var(--t1)}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px}
.hamburger span{width:22px;height:2px;background:var(--t2);border-radius:2px;transition:.3s}

/* ═══ LAYOUT ═══ */
#layout{display:flex;padding-top:58px;min-height:100vh}

/* ═══ SIDEBAR ═══ */
#sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:58px;bottom:0;left:0;overflow-y:auto;transition:.3s;z-index:40;display:flex;flex-direction:column}
#sidebar::-webkit-scrollbar{width:3px}
.sidebar-section{padding:16px 12px 8px;font-size:10px;letter-spacing:3px;color:var(--t3);font-family:var(--font-head)}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--r);cursor:pointer;color:var(--t2);transition:.2s;margin:1px 8px;font-size:14px;font-weight:500;position:relative;text-decoration:none}
.nav-item:hover{background:var(--card);color:var(--cyan)}
.nav-item.active{background:linear-gradient(135deg,rgba(0,245,255,.12),rgba(0,245,255,.05));color:var(--cyan);border:1px solid rgba(0,245,255,.2)}
.nav-item i{width:18px;text-align:center;font-size:14px}
.nav-badge{position:absolute;right:10px;background:var(--pink);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;font-family:var(--font-head)}
.sidebar-bottom{margin-top:auto;padding:12px 8px;border-top:1px solid var(--border)}
.sidebar-overlay{display:none;position:fixed;inset:0;z-index:39;background:rgba(0,0,0,.6)}

/* ═══ MAIN CONTENT ═══ */
#main{flex:1;margin-left:220px;padding:24px;min-height:calc(100vh - 58px)}

/* ═══ PAGE HEADER ═══ */
.page-hdr{margin-bottom:24px}
.page-hdr h2{font-family:var(--font-head);font-size:20px;font-weight:900;letter-spacing:2px;color:var(--t1)}
.page-hdr p{color:var(--t3);font-size:13px;margin-top:4px}
.cyan-line{width:40px;height:3px;background:linear-gradient(90deg,var(--cyan),transparent);border-radius:2px;margin-top:8px}

/* ═══ CARDS ═══ */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:20px;transition:.2s}
.card:hover{border-color:rgba(0,245,255,.25)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:18px;position:relative;overflow:hidden;transition:.2s}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card.cyan::before{background:linear-gradient(90deg,var(--cyan),transparent)}
.stat-card.pink::before{background:linear-gradient(90deg,var(--pink),transparent)}
.stat-card.yellow::before{background:linear-gradient(90deg,var(--yellow),transparent)}
.stat-card.green::before{background:linear-gradient(90deg,var(--green),transparent)}
.stat-card:hover{transform:translateY(-2px)}
.stat-icon{font-size:22px;margin-bottom:10px}
.stat-card.cyan .stat-icon{color:var(--cyan)}
.stat-card.pink .stat-icon{color:var(--pink)}
.stat-card.yellow .stat-icon{color:var(--yellow)}
.stat-card.green .stat-icon{color:var(--green)}
.stat-val{font-family:var(--font-head);font-size:26px;font-weight:900;color:var(--t1)}
.stat-label{font-size:11px;color:var(--t3);letter-spacing:1px;margin-top:2px}

/* ═══ GAMES GRID ═══ */
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.game-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:.25s;position:relative}
.game-card:hover{transform:translateY(-4px);border-color:var(--cyan);box-shadow:var(--glow-c)}
.game-thumb{width:100%;height:130px;object-fit:cover;display:block;background:linear-gradient(135deg,var(--bg2),var(--bg3))}
.game-thumb-placeholder{width:100%;height:130px;background:linear-gradient(135deg,var(--bg2),var(--card2));display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--t3)}
.game-badge{position:absolute;top:8px;right:8px;padding:3px 8px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:1px;font-family:var(--font-head)}
.badge-new{background:var(--green);color:#000}
.badge-hot{background:var(--pink);color:#fff}
.badge-top{background:var(--yellow);color:#000}
.game-info{padding:12px}
.game-title{font-family:var(--font-head);font-size:12px;font-weight:700;letter-spacing:1px;color:var(--t1);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-meta{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--t3)}
.game-rating{color:var(--yellow);display:flex;align-items:center;gap:3px}
.game-plays{display:flex;align-items:center;gap:4px}
.game-cat-tag{font-size:10px;background:rgba(0,245,255,.1);color:var(--cyan);padding:2px 7px;border-radius:4px;border:1px solid rgba(0,245,255,.2)}

/* ═══ GAME DETAIL ═══ */
.game-detail-hero{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:20px}
.game-hero-img{width:100%;height:220px;object-fit:cover;background:linear-gradient(135deg,var(--bg2),var(--bg3))}
.game-hero-placeholder{width:100%;height:220px;background:linear-gradient(135deg,var(--bg2),var(--card2));display:flex;align-items:center;justify-content:center;font-size:60px;color:var(--t3)}
.game-hero-info{padding:20px}
.game-hero-title{font-family:var(--font-head);font-size:22px;font-weight:900;letter-spacing:2px;margin-bottom:10px}
.game-hero-meta{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
.meta-chip{display:flex;align-items:center;gap:5px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:12px;color:var(--t2)}
.meta-chip i{color:var(--cyan);font-size:11px}
.game-desc{color:var(--t2);font-size:14px;line-height:1.7;margin-bottom:16px}
.play-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--cyan),var(--cyan2));color:#000;padding:13px 28px;border-radius:var(--r);font-family:var(--font-head);font-size:12px;letter-spacing:2px;font-weight:700;cursor:pointer;border:none;transition:.2s}
.play-btn:hover{transform:translateY(-2px);box-shadow:var(--glow-c)}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--cyan);cursor:pointer;font-size:13px;margin-bottom:16px;background:none;border:none;padding:0}
.back-btn:hover{text-decoration:underline}

/* ═══ GAME FRAME ═══ */
#gameFrame{display:none;position:fixed;inset:0;z-index:200;background:#000;flex-direction:column}
#gameFrame.active{display:flex}
.frame-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.frame-title{font-family:var(--font-head);font-size:13px;letter-spacing:2px;color:var(--cyan);flex:1}
.frame-close{background:var(--pink);color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-family:var(--font-head);font-size:11px;letter-spacing:1px}
#gameIframe{flex:1;width:100%;border:none;background:#000}

/* ═══ LEADERBOARD ═══ */
.lb-table{width:100%;border-collapse:collapse}
.lb-table th{background:var(--bg2);padding:10px 14px;text-align:left;font-family:var(--font-head);font-size:10px;letter-spacing:2px;color:var(--t3);border-bottom:1px solid var(--border)}
.lb-table td{padding:11px 14px;border-bottom:1px solid rgba(26,58,92,.4);font-size:13px;color:var(--t2)}
.lb-table tr:hover td{background:var(--card2);color:var(--t1)}
.lb-rank{font-family:var(--font-head);font-weight:700;color:var(--cyan)}
.lb-rank.gold{color:var(--yellow)}
.lb-rank.silver{color:#c0c0c0}
.lb-rank.bronze{color:#cd7f32}
.lb-avatar-sm{width:28px;height:28px;background:linear-gradient(135deg,var(--cyan),var(--pink));border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000;margin-right:8px;vertical-align:middle}

/* ═══ PROFILE ═══ */
.profile-header{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:24px;display:flex;align-items:center;gap:20px;margin-bottom:20px}
.profile-avatar{width:72px;height:72px;background:linear-gradient(135deg,var(--cyan),var(--pink));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#000;flex-shrink:0;border:2px solid var(--cyan);box-shadow:var(--glow-c)}
.profile-name{font-family:var(--font-head);font-size:18px;font-weight:900;letter-spacing:2px}
.profile-role{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:1px;font-family:var(--font-head);margin-top:5px}
.role-admin{background:rgba(255,0,110,.15);border:1px solid rgba(255,0,110,.3);color:var(--pink)}
.role-player{background:rgba(0,245,255,.1);border:1px solid rgba(0,245,255,.2);color:var(--cyan)}
.badges-grid{display:flex;flex-wrap:wrap;gap:10px}
.badge-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:13px}
.badge-item i{font-size:20px}
.badge-item.locked{opacity:.35;filter:grayscale(1)}

/* ═══ DAILY CHALLENGE ═══ */
.challenge-card{background:linear-gradient(135deg,rgba(255,230,0,.08),rgba(255,0,110,.06));border:1px solid rgba(255,230,0,.2);border-radius:var(--r2);padding:20px;margin-bottom:20px}
.challenge-title{font-family:var(--font-head);font-size:14px;letter-spacing:2px;color:var(--yellow);margin-bottom:6px}
.challenge-desc{color:var(--t2);font-size:13px;margin-bottom:14px}
.challenge-progress{background:var(--bg2);border-radius:4px;height:6px;overflow:hidden;margin-bottom:8px}
.challenge-bar{height:100%;background:linear-gradient(90deg,var(--yellow),var(--pink));border-radius:4px;transition:.5s}
.challenge-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--t3)}
.countdown{font-family:var(--font-mono);color:var(--yellow);font-size:13px}

/* ═══ COMMENTS ═══ */
.comment-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.comment-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.comment-user{font-family:var(--font-head);font-size:11px;color:var(--cyan);letter-spacing:1px}
.comment-time{font-size:11px;color:var(--t3)}
.comment-text{font-size:13px;color:var(--t2);line-height:1.5}
.comment-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;color:var(--t1);font-family:var(--font-body);font-size:13px;resize:vertical;min-height:70px;outline:none;transition:.2s}
.comment-input:focus{border-color:var(--cyan)}

/* ═══ ADMIN ═══ */
.admin-table{width:100%;border-collapse:collapse}
.admin-table th{background:var(--bg2);padding:10px 14px;text-align:left;font-family:var(--font-head);font-size:10px;letter-spacing:2px;color:var(--t3);border-bottom:1px solid var(--border)}
.admin-table td{padding:10px 14px;border-bottom:1px solid rgba(26,58,92,.4);font-size:13px;color:var(--t2);vertical-align:middle}
.admin-table tr:hover td{background:var(--card2)}
.action-btns{display:flex;gap:6px}

/* ═══ MODAL ═══ */
#modal{display:none;position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px}
#modal.open{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);width:100%;max-width:500px;max-height:85vh;overflow-y:auto;box-shadow:var(--glow-c)}
.modal-hdr{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-hdr h3{font-family:var(--font-head);font-size:14px;letter-spacing:2px;color:var(--cyan)}
.modal-close{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer}
.modal-close:hover{color:var(--pink)}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}

/* ═══ TOAST ═══ */
#toasts{position:fixed;top:70px;right:16px;z-index:300;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 16px;font-size:13px;display:flex;align-items:center;gap:10px;animation:slideIn .3s ease;pointer-events:auto;min-width:240px;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.success{border-color:rgba(0,255,136,.4);color:var(--green)}
.toast.error{border-color:rgba(255,0,110,.4);color:#ff6ea8}
.toast.info{border-color:rgba(0,245,255,.3);color:var(--cyan)}
.toast.warn{border-color:rgba(255,230,0,.3);color:var(--yellow)}
.toast.fade{animation:fadeOut .3s ease forwards}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeOut{to{opacity:0;transform:translateX(20px)}}

/* ═══ STARS ═══ */
.stars{display:flex;gap:2px}
.stars i{color:var(--t3);cursor:pointer;font-size:16px;transition:.1s}
.stars i.active,.stars i:hover{color:var(--yellow)}

/* ═══ SECTION TITLES ═══ */
.sec-title{font-family:var(--font-head);font-size:14px;letter-spacing:2px;color:var(--t1);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ═══ EMPTY STATE ═══ */
.empty{text-align:center;padding:50px 20px;color:var(--t3)}
.empty i{font-size:44px;margin-bottom:14px;display:block;opacity:.4}
.empty p{font-size:14px}

/* ═══ SEARCH RESULTS ═══ */
#searchDrop{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-top:4px;max-height:250px;overflow-y:auto;display:none;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.search-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:.15s}
.search-item:hover{background:var(--card2);color:var(--cyan)}
.search-item i{color:var(--t3);font-size:13px;width:16px}

/* ═══ TABS ═══ */
.tabs{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:9px 16px;cursor:pointer;font-family:var(--font-head);font-size:11px;letter-spacing:1px;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:.2s;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}

/* ═══ CATEGORY FILTER ═══ */
.cat-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.cat-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--t3);cursor:pointer;font-family:var(--font-body);font-size:12px;transition:.2s}
.cat-btn:hover,.cat-btn.active{background:rgba(0,245,255,.1);border-color:var(--cyan);color:var(--cyan)}

/* ═══ PROGRESS BAR ═══ */
.xp-bar{background:var(--bg2);border-radius:4px;height:8px;overflow:hidden;margin:8px 0}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--pink));border-radius:4px;transition:.6s}

/* ═══ NOTIFICATION PANEL ═══ */
#notifPanel{display:none;position:fixed;top:62px;right:16px;width:300px;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);z-index:80;box-shadow:0 8px 32px rgba(0,0,0,.6);max-height:400px;overflow-y:auto}
#notifPanel.open{display:block}
.notif-hdr{padding:14px 16px;border-bottom:1px solid var(--border);font-family:var(--font-head);font-size:11px;letter-spacing:2px;color:var(--cyan)}
.notif-item{padding:12px 16px;border-bottom:1px solid rgba(26,58,92,.4);font-size:12px;color:var(--t2);display:flex;gap:10px;align-items:flex-start}
.notif-item i{color:var(--cyan);margin-top:2px;flex-shrink:0}
.notif-item.unread{background:rgba(0,245,255,.04)}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  #sidebar{left:-220px}
  #sidebar.open{left:0}
  .sidebar-overlay.open{display:block}
  #main{margin-left:0;padding:16px}
  .hamburger{display:flex}
  .header-search{display:none}
  .games-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .stat-grid{grid-template-columns:1fr 1fr}
  .profile-header{flex-direction:column;text-align:center}
  .header-logo span{font-size:13px}
}
@media(max-width:480px){
  .games-grid{grid-template-columns:1fr 1fr}
  .stat-grid{grid-template-columns:1fr 1fr}
}

/* ═══ UTILS ═══ */
.flex{display:flex}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}
.items-center{align-items:center}.justify-between{justify-content:space-between}
.wrap{flex-wrap:wrap}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.text-cyan{color:var(--cyan)}.text-pink{color:var(--pink)}.text-green{color:var(--green)}.text-yellow{color:var(--yellow)}
.text-sm{font-size:12px}.text-xs{font-size:11px}
.font-head{font-family:var(--font-head)}
.divider{height:1px;background:var(--border);margin:16px 0}
.hidden{display:none!important}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.input-row{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- PARTICLES -->
<div id="particles"></div>

<!-- ══════════════ LOGIN PAGE ══════════════ -->
<div id="loginPage">
  <div class="login-wrap">
    <div class="login-logo">
      <i class="fa-solid fa-bolt-lightning logo-icon"></i>
      <h1>HYPERNOVA</h1>
      <p>NEXT-GEN GAMING PORTAL</p>
    </div>
    <div class="login-card">
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">LOGIN</button>
        <button class="auth-tab" data-tab="register">REGISTER</button>
        <button class="auth-tab" data-tab="forgot">FORGOT</button>
      </div>

      <!-- LOGIN -->
      <div class="auth-panel active" id="panel-login">
        <div class="auth-msg error" id="login-err"></div>
        <div class="field"><label>ROLE</label>
          <select id="l-role">
            <option value="player">🎮 Player</option>
            <option value="admin">🛡️ Admin</option>
          </select>

        <div class="field"><label>USERNAME</label><input id="l-user" type="text" placeholder="Enter username" autocomplete="username"/></div>
        <div class="field"><label>PASSWORD</label><input id="l-pass" type="password" placeholder="Enter password" autocomplete="current-password"/></div>

      <!-- REGISTER -->

        <div class="auth-msg error" id="reg-err"></div>
        <div class="auth-msg success" id="reg-ok"></div>
        <div class="field"><label>FULL NAME</label><input id="r-name" type="text" placeholder="Your name"/></div>
        <div class="field"><label>USERNAME</label><input id="r-user" type="text" placeholder="Choose username"/></div>
        <div class="field"><label>PASSWORD</label><input id="r-pass" type="password" placeholder="Min 6 characters"/></div>
        <div class="field"><label>CONFIRM PASSWORD</label><input id="r-pass2" type="password" placeholder="Repeat password"/></div>
        <button class="btn btn-cyan" onclick="doRegister()"><i class="fa-solid fa-user-plus"></i> CREATE ACCOUNT</button>

      <!-- FORGOT -->

    </div>
  </div>
</div>

<!-- ══════════════ APP ══════════════ -->
<div id="app">
  <!-- HEADER -->
  <div id="header">
    <div class="hamburger" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </div>
    <a class="header-logo" onclick="nav('home')">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
'use strict';
// ════════════════════════════════════════════════════════
//  HYPERNOVA — Gaming Portal v1.0
//  Firebase Realtime Database + GitHub Pages
// ════════════════════════════════════════════════════════

// ── FIREBASE CONFIG (apna config yahan dalo) ──
const FB_CONFIG = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT.firebaseapp.com",
  databaseURL:       "YOUR_DATABASE_URL",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT.firebasestorage.app",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};

// ── CONSTANTS ──
const USE_FB = FB_CONFIG.apiKey !== 'YOUR_API_KEY';
const SK = 'hn_session';
const PK = 'hn_page';
const DAILY_KEY = 'hn_daily';

// ── STATE ──
const S = { user:null, page:'home', gameId:null, notifs:[], slideTimer:null };
let _fbReady=false, _fbRef=null, _isOwnSave=false;

// ── DB ──
const DB_DEFAULT = {
  users:[
    {id:1,name:'Admin',username:'admin',password:'admin123',role:'admin',xp:0,level:1,badges:[],createdAt:Date.now()},
    {id:2,name:'Player One',username:'player1',password:'pass123',role:'player',xp:150,level:2,badges:['first_game'],createdAt:Date.now()}
  ],
  games:[],
  categories:['Action','Adventure','Puzzle','Racing','Sports','Strategy','Arcade','RPG'],
  announcements:[]
};
const DB = { users:[...DB_DEFAULT.users.map(u=>({...u}))], games:[], categories:[...DB_DEFAULT.categories], announcements:[] };

// ═══════════════════════════════════════
//  FIREBASE
// ═══════════════════════════════════════
function initFB(){
  if(!USE_FB) { _fbReady=true; loadLocalDB(); showApp(); return; }
  try {
    if(!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
    const db = firebase.database();
    _fbRef = db.ref('hypernova');
    _fbRef.once('value', snap => {
      _fbReady = true;
      const d = snap.val();
      if(d){ applyDB(d); toast('info','fa-database','Server connected!'); }
      else { pushDB(); }
      document.getElementById('fbStatus').innerHTML = '<i class="fa-solid fa-circle" style="color:var(--green);font-size:8px"></i> Server connected';
      // Retry session after Firebase loaded
      if(!S.user){ retrySession(); }
      else { rerenderPage(); }
    });
    // Realtime listener
    _fbRef.on('value', snap => {
      if(_isOwnSave){ _isOwnSave=false; return; }
      const d = snap.val();
      if(d && _fbReady){ applyDB(d); if(S.user) rerenderPage(); }
    });
  } catch(e){ console.warn('FB error:',e); _fbReady=true; loadLocalDB(); }
}

function applyDB(d){
  if(d.users && Array.isArray(d.users) && d.users.length>0){
    const fbIds = d.users.map(u=>u.id);
    const localOnly = DB.users.filter(u=>!fbIds.includes(u.id));
    DB.users = [...d.users, ...localOnly];
  }
  if(d.games && Array.isArray(d.games)){
    const fbGIds = d.games.map(g=>g.id);
    const localNew = DB.games.filter(g=>!fbGIds.includes(g.id));
    DB.games = [...d.games, ...localNew];
    // Restore htmlContent from localStorage
    DB.games.forEach(g=>{
      if(!g.htmlContent){ const h=localStorage.getItem('hn_html_'+g.id); if(h) g.htmlContent=h; }
    });
  }
  if(d.categories && Array.isArray(d.categories)) DB.categories = d.categories;
  if(d.announcements) DB.announcements = d.announcements;
  updateBadge();
}

function saveDB(){
  const snap = buildSnap();
  localStorage.setItem('hn_db', JSON.stringify(snap));
  if(!USE_FB || !_fbRef) return;
  _isOwnSave = true;
  _fbRef.set(snap).catch(e=>{ _isOwnSave=false; toast('error','fa-triangle-exclamation','Save failed: '+e.message); });
}

function buildSnap(){
  const copy = JSON.parse(JSON.stringify({users:DB.users,games:DB.games,categories:DB.categories,announcements:DB.announcements}));
  copy.games.forEach(g=>{ if(g.htmlContent){ try{localStorage.setItem('hn_html_'+g.id,g.htmlContent);}catch(e){} delete g.htmlContent; } });
  return copy;
}

function pushDB(){ if(_fbRef) _fbRef.set(buildSnap()); }

function loadLocalDB(){
  try {
    const raw=localStorage.getItem('hn_db');
    if(raw) applyDB(JSON.parse(raw));
  } catch(e){}
}

// ═══════════════════════════════════════
//  SESSION
// ═══════════════════════════════════════
function sessionSave(u){ localStorage.setItem(SK, JSON.stringify({id:u.id,role:u.role})); }
function sessionClear(){ localStorage.removeItem(SK); localStorage.removeItem(PK); }
function sessionLoad(){
  try {
    const s=JSON.parse(localStorage.getItem(SK)||'null');
    if(!s) return false;
    const u=DB.users.find(x=>x.id===s.id && x.role===s.role);
    if(!u) return false;
    S.user=u;
    return true;
  } catch(e){ return false; }
}
function retrySession(){
  if(sessionLoad()){
    document.getElementById('loginPage').style.display='none';
    document.getElementById('app').style.display='block';
    initApp(true);
  }
}
function savePage(p,id){ localStorage.setItem(PK,JSON.stringify({page:p,id:id||null})); }
function loadPage(){ try{ return JSON.parse(localStorage.getItem(PK)||'{"page":"home","id":null}'); }catch(e){ return {page:'home',id:null}; } }

// ═══════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════
function doLogin(){
  const role=document.getElementById('l-role').value;
  const uname=val('l-user'), pass=val('l-pass');
  hideMsg('login-err');
  if(!uname||!pass){ showErr('login-err','Please fill all fields.'); return; }
  if(!_fbReady && USE_FB){ showErr('login-err','Connecting to server... please wait.'); return; }
  const u=DB.users.find(x=>x.username===uname && x.password===pass && x.role===role);
  if(!u){ showErr('login-err','Invalid credentials. Check username, password and role.'); return; }
  S.user=u; sessionSave(u);
  document.getElementById('loginPage').style.display='none';
  document.getElementById('app').style.display='block';
  initApp(false);
  toast('success','fa-bolt-lightning','Welcome back, '+u.name+'!');
  // Grant login badge
  grantBadge(u,'first_login');
}

function doRegister(){
  const name=val('r-name'), uname=val('r-user'), pass=val('r-pass'), pass2=val('r-pass2');
  hideMsg('reg-err'); hideMsg('reg-ok');
  if(!name||!uname||!pass||!pass2){ showErr('reg-err','Please fill all fields.'); return; }
  if(pass.length<6){ showErr('reg-err','Password must be at least 6 characters.'); return; }
  if(pass!==pass2){ showErr('reg-err','Passwords do not match.'); return; }
  if(DB.users.find(x=>x.username===uname)){ showErr('reg-err','Username already taken.'); return; }
  const newUser={id:Date.now(),name,username:uname,password:pass,role:'player',xp:0,level:1,badges:[],createdAt:Date.now()};
  DB.users.push(newUser);
  saveDB();
  showMsg('reg-ok','Account created! You can now login.');
  setTimeout(()=>switchTab('login'),1500);
}

function doForgot(){
  const uname=val('f-user'), pass=val('f-pass'), pass2=val('f-pass2');
  hideMsg('forg-err'); hideMsg('forg-ok');
  if(!uname||!pass||!pass2){ showErr('forg-err','Please fill all fields.'); return; }
  if(pass!==pass2){ showErr('forg-err','Passwords do not match.'); return; }
  const u=DB.users.find(x=>x.username===uname && x.role==='player');
  if(!u){ showErr('forg-err','Player username not found.'); return; }
  u.password=pass; saveDB();
  showMsg('forg-ok','Password reset! You can now login.');
  setTimeout(()=>switchTab('login'),1500);
}

function doLogout(){
  S.user=null; sessionClear();
  document.getElementById('app').style.display='none';
  document.getElementById('loginPage').style.display='flex';
  resetLoginForm();
  toast('info','fa-right-from-bracket','Signed out.');
}

function showErr(id,msg){ const e=document.getElementById(id); if(e){e.textContent=msg;e.style.display='block';} }
function showMsg(id,msg){ const e=document.getElementById(id); if(e){e.textContent=msg;e.style.display='block';} }
function hideMsg(id){ const e=document.getElementById(id); if(e) e.style.display='none'; }
function val(id){ const e=document.getElementById(id); return e?e.value.trim():''; }
function resetLoginForm(){ ['l-user','l-pass','r-name','r-user','r-pass','r-pass2','f-user','f-pass','f-pass2'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';}); }

// ═══════════════════════════════════════
//  APP INIT & NAVIGATION
// ═══════════════════════════════════════
function initApp(restore){
  renderHeader();
  renderSidebar();
  const isAdmin = S.user?.role==='admin';
  document.getElementById('adminNav').classList.toggle('hidden',!isAdmin);
  if(restore){
    const saved=loadPage();
    navigate(saved.page||'home', saved.id);
  } else {
    navigate('home');
  }
  checkDailyChallenge();
}

function showApp(){
  if(sessionLoad()){
    document.getElementById('loginPage').style.display='none';
    document.getElementById('app').style.display='block';
    initApp(true);
  }
}

function navigate(page, id){
  S.page=page; S.gameId=id||null;
  savePage(page,id||null);
  // Update URL hash
  const hash = id ? `#${page}/${id}` : `#${page}`;
  if(window.location.hash!==hash) history.pushState({page,id:id||null},'',hash);
  // Nav active
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===page));
  closeSidebar();
  const el=document.getElementById('pageContent');
  if(el) el.innerHTML='';
  const pages={home:renderHome,games:renderGames,categories:renderCategories,leaderboard:renderLeaderboard,profile:renderProfile,challenges:renderChallenges,admin:renderAdmin,gamedetail:()=>renderGameDetail(id)};
  (pages[page]||renderHome)();
  updateBadge();
}

function nav(page,id){ navigate(page,id); }

function rerenderPage(){
  if(!S.user||!document.getElementById('pageContent')) return;
  navigate(S.page, S.gameId);
}

function renderHeader(){
  const u=S.user;
  if(!u) return;

function saveProfile(){

  if(u){ Object.assign(u,S.user); }
  saveDB();
  renderHeader();
  toast('success','fa-check','Profile saved!');
}

      ${[

        {icon:'fa-star',label:'Rate a Game',xp:15,done:(S.user.badges||[]).includes('rater'),color:'green'},
        {icon:'fa-comments',label:'Write a Comment',xp:15,done:(S.user.badges||[]).includes('commentator'),color:'pink'},
        {icon:'fa-trophy',label:'Reach Level 3',xp:100,done:(S.user.level||1)>=3,color:'yellow'},
      ].map(c=>`
        <div class="card flex gap12 items-center" style="${c.done?'border-color:rgba(0,255,136,.3);background:rgba(0,255,136,.04)':''}">
          <i class="fa-solid ${c.icon}" style="font-size:20px;color:var(--${c.color});width:24px;text-align:center"></i>
          <div style="flex:1">
            <div style="font-family:var(--font-head);font-size:12px;letter-spacing:1px">${c.label}</div>

        </div>`).join('')}
    </div>

      <div class="stat-card yellow"><div class="stat-icon"><i class="fa-solid fa-fire"></i></div><div class="stat-val">${totalPlays}</div><div class="stat-label">TOTAL PLAYS</div></div>
      <div class="stat-card green"><div class="stat-icon"><i class="fa-solid fa-layer-group"></i></div><div class="stat-val">${DB.categories.length}</div><div class="stat-label">CATEGORIES</div></div>

}

function adminTab(tab, btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const c=document.getElementById('adminTabContent');
  if(tab==='games') c.innerHTML=renderAdminGames();
  else if(tab==='players') c.innerHTML=renderAdminPlayers();
  else c.innerHTML=renderAdminAnnounce();
}

// ═══════════════════════════════════════
//  GAME ACTIONS
// ═══════════════════════════════════════
function openAddGame(){
  openModal('ADD NEW GAME', gameFormHTML(null), `<button class="btn btn-outline btn-sm" onclick="closeModal()">CANCEL</button><button class="btn btn-cyan btn-sm" onclick="saveGame()"><i class="fa-solid fa-plus"></i> ADD GAME</button>`);
}
function openEditGame(id){
  const g=DB.games.find(x=>x.id===id);
  if(!g) return;
  openModal('EDIT GAME', gameFormHTML(g), `<button class="btn btn-outline btn-sm" onclick="closeModal()">CANCEL</button><button class="btn btn-cyan btn-sm" onclick="saveGame(${id})"><i class="fa-solid fa-check"></i> SAVE</button>`);
}

function gameFormHTML(g){
  return `
    <div class="input-row">
      <div class="field"><label>GAME TITLE *</label><input id="gTitle" value="${g?g.title:''}" placeholder="Game name"/></div>
      <div class="field"><label>CATEGORY</label><select id="gCat">
        ${DB.categories.map(c=>`<option ${g&&g.category===c?'selected':''}>${c}</option>`).join('')}
      </select></div>

      <div class="field"><label>THUMBNAIL URL</label><input id="gThumb" value="${g?g.thumb||'':''}" placeholder="https://..."/></div>

    </div>

      <input type="file" id="gFile" accept=".html,.htm" style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px;color:var(--t2);width:100%;cursor:pointer"/>
      ${g&&g.htmlContent?`<div style="color:var(--green);font-size:11px;margin-top:4px"><i class="fa-solid fa-check"></i> HTML file uploaded</div>`:''}

  `;

function saveGame(gid){
  const title=document.getElementById('gTitle')?.value.trim();
  if(!title){ toast('error','fa-xmark','Game title is required!'); return; }
  const data={
    title,
    category:document.getElementById('gCat')?.value||'',
    description:document.getElementById('gDesc')?.value.trim()||'',
    thumb:document.getElementById('gThumb')?.value.trim()||'',
    badge:document.getElementById('gBadge')?.value||'',
    url:document.getElementById('gUrl')?.value.trim()||'',
  };

  const fileInput=document.getElementById('gFile');
  const file=fileInput?.files[0];

  const doSave=(htmlContent)=>{
    if(htmlContent) data.htmlContent=htmlContent;
    if(gid){
      const g=DB.games.find(x=>x.id===gid);
      if(g){ if(!data.htmlContent && g.htmlContent) data.htmlContent=g.htmlContent; Object.assign(g,data); }
      saveDB();
      closeModal();
      toast('success','fa-check','Game updated!');
      nav('gamedetail',gid);
    } else {
      data.id=DB.games.length>0?Math.max(...DB.games.map(x=>x.id))+1:1;
      data.plays=0; data.comments=[]; data.ratings=[];
      DB.games.push(data);
      saveDB();
      closeModal();
      toast('success','fa-check','Game added!');
      updateBadge();
      const newId=data.id;
      setTimeout(()=>nav('gamedetail',newId),200);
    }
  };

  if(file){
    const reader=new FileReader();
    reader.onload=e=>doSave(e.target.result);
    reader.readAsText(file);
  } else { doSave(null); }
}

function deleteGame(id){
  if(!confirm('Delete this game?')) return;
  DB.games=DB.games.filter(g=>g.id!==id);
  localStorage.removeItem('hn_html_'+id);
  saveDB();
  toast('success','fa-trash','Game deleted.');
  nav('admin');
}

function deletePlayer(id){
  if(!confirm('Delete this player?')) return;
  DB.users=DB.users.filter(u=>u.id!==id);
  saveDB();
  renderAdmin();
  toast('success','fa-trash','Player removed.');
}

function postAnnounce(){
  const text=document.getElementById('announceIn')?.value.trim();
  if(!text) return;
  if(!DB.announcements) DB.announcements=[];
  DB.announcements.unshift({text,time:Date.now()});
  saveDB();
  renderAdmin();
  toast('success','fa-bullhorn','Announcement posted!');
}

function deleteAnnounce(i){
  DB.announcements.splice(i,1);
  saveDB();
  renderAdmin();
}

// ═══════════════════════════════════════
//  PLAY GAME
// ═══════════════════════════════════════
function playGame(id){
  const g=DB.games.find(x=>x.id===parseInt(id)||x.id==id);
  if(!g){ toast('error','fa-xmark','Game not found!'); return; }

  // Increment plays
  g.plays=(g.plays||0)+1;
  saveDB();

  // Daily challenge progress
  const today=new Date().toDateString();
  const saved=JSON.parse(localStorage.getItem(DAILY_KEY)||'{}');
  const progress=(saved.date===today?saved.progress:0)+1;
  localStorage.setItem(DAILY_KEY,JSON.stringify({date:today,progress}));
  if(progress>=5){ grantBadge(S.user,'daily_player'); addXP(S.user,50); toast('success','fa-trophy','Daily challenge complete! +50 XP'); }
  else { addXP(S.user,5); }
  grantBadge(S.user,'first_game');

  // Open game
  const src = g.htmlContent ? URL.createObjectURL(new Blob([g.htmlContent],{type:'text/html'})) : g.url;
  if(!src){ toast('error','fa-xmark','No game file uploaded.'); return; }

  document.getElementById('frameTitle').textContent=g.title.toUpperCase();
  document.getElementById('gameIframe').src=src;
  document.getElementById('gameFrame').classList.add('active');
}

function closeGame(){
  document.getElementById('gameFrame').classList.remove('active');
  document.getElementById('gameIframe').src='';
}

// ═══════════════════════════════════════
//  RATINGS & COMMENTS
// ═══════════════════════════════════════
function rateGame(gid,val){
  const g=DB.games.find(x=>x.id===gid);
  if(!g) return;
  if(!g.ratings) g.ratings=[];
  const existing=g.ratings.find(r=>r.uid===S.user.id);
  if(existing) existing.val=val;
  else g.ratings.push({uid:S.user.id,val});
  saveDB();
  grantBadge(S.user,'rater');
  toast('success','fa-star','Rating saved!');
  renderGameDetail(gid);
}

function hoverStars(val){
  document.querySelectorAll('#starRow i').forEach((s,i)=>{
    s.className=`fa-${i<val?'solid':'regular'} fa-star${i<val?' active':''}`;
  });
}
function resetStars(val){
  document.querySelectorAll('#starRow i').forEach((s,i)=>{
    s.className=`fa-${i<val?'solid':'regular'} fa-star${i<val?' active':''}`;
  });
}

function submitComment(gid){
  const text=document.getElementById('commentIn')?.value.trim();
  if(!text){ toast('warn','fa-comment','Write something first!'); return; }
  const g=DB.games.find(x=>x.id===gid);
  if(!g) return;
  if(!g.comments) g.comments=[];
  g.comments.push({uid:S.user.id,user:S.user.username,name:S.user.name||S.user.username,text,time:Date.now()});
  saveDB();
  grantBadge(S.user,'commentator');
  toast('success','fa-paper-plane','Comment posted!');
  renderGameDetail(gid);
}

// ═══════════════════════════════════════
//  XP & BADGES
// ═══════════════════════════════════════
function addXP(u,amount){
  u.xp=(u.xp||0)+amount;
  u.level=Math.floor(u.xp/100)+1;
  u.gamesPlayed=(u.gamesPlayed||0)+1;
  const dbUser=DB.users.find(x=>x.id===u.id);
  if(dbUser) Object.assign(dbUser,u);
  sessionSave(u);
  saveDB();
  toast('info','fa-star',`+${amount} XP!`);
  if(u.level>=3) grantBadge(u,'lvl5');
  if((u.gamesPlayed||0)>=10) grantBadge(u,'plays10');
  if((u.gamesPlayed||0)>=50) grantBadge(u,'plays50');
}

function grantBadge(u,badge){
  if(!u) return;
  if(!u.badges) u.badges=[];
  if(u.badges.includes(badge)) return;
  u.badges.push(badge);
  const dbUser=DB.users.find(x=>x.id===u.id);
  if(dbUser) dbUser.badges=u.badges;
  saveDB();
  toast('success','fa-shield-halved','Badge unlocked!');
}

function checkDailyChallenge(){
  const today=new Date().toDateString();
  const saved=JSON.parse(localStorage.getItem(DAILY_KEY)||'{}');
  if(saved.date!==today) localStorage.setItem(DAILY_KEY,JSON.stringify({date:today,progress:0}));
}

//  SEARCH
// ═══════════════════════════════════════
function onSearch(q){
  const drop=document.getElementById('searchDrop');
  if(!q||q.length<2){ drop.style.display='none'; return; }
  const results=DB.games.filter(g=>g.title.toLowerCase().includes(q.toLowerCase())).slice(0,6);
  if(!results.length){ drop.style.display='none'; return; }
  drop.innerHTML=results.map(g=>`<div class="search-item" onclick="nav('gamedetail',${g.id});closeDrop()"><i class="fa-solid fa-gamepad"></i>${g.title}</div>`).join('');
  drop.style.display='block';
}
function closeDrop(){ const d=document.getElementById('searchDrop'); if(d) d.style.display='none'; }

function toggleNotif(){

function renderNotifs(){

  el.innerHTML=notifs.length?notifs.map(n=>`<div class="notif-item ${n.unread?'unread':''}"><i class="fa-solid ${n.icon}"></i><span>${n.text}</span></div>`).join(''):`<div style="padding:16px;text-align:center;color:var(--t3);font-size:13px">No notifications</div>`;

}

// ═══════════════════════════════════════
function openModal(title,body,footer){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalFooter').innerHTML=footer||'';
  document.getElementById('modal').classList.add('open');
}

// ═══════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════
function toast(type,icon,msg){
  const c=document.getElementById('toasts');
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  t.innerHTML=`<i class="fa-solid ${icon}"></i>${msg}`;
  c.appendChild(t);
  setTimeout(()=>{ t.classList.add('fade'); setTimeout(()=>t.remove(),300); },3000);
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}
function switchTab(tab){
  document.querySelectorAll('.auth-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.querySelectorAll('.auth-panel').forEach(p=>p.classList.toggle('active',p.id===`panel-${tab}`));
}

//  HELPERS
// ═══════════════════════════════════════
function gameCard(g){
  return `<div class="game-card" onclick="nav('gamedetail',${g.id})">
    ${g.thumb?`<img class="game-thumb" src="${g.thumb}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="game-thumb-placeholder" style="display:none">${catIcon(g.category)}</div>`:
    `<div class="game-thumb-placeholder">${catIcon(g.category)}</div>`}
    ${g.badge?`<span class="game-badge badge-${g.badge.toLowerCase()}">${g.badge}</span>`:''}
    <div class="game-info">
      <div class="game-title">${g.title}</div>
      <div class="game-meta">
        <span class="game-cat-tag">${g.category||'Game'}</span>
        <span class="game-plays"><i class="fa-solid fa-fire" style="color:var(--pink);font-size:10px"></i>${g.plays||0}</span>
      </div>
    </div>
  </div>`;
}

function catIcon(cat){
  const icons={Action:'⚔️',Adventure:'🗺️',Puzzle:'🧩',Racing:'🏎️',Sports:'⚽',Strategy:'♟️',Arcade:'🕹️',RPG:'🐉'};
  return icons[cat]||'🎮';
}

function timeAgo(ts){
  const diff=Date.now()-ts;
  if(diff<60000) return 'just now';
  if(diff<3600000) return Math.floor(diff/60000)+'m ago';
  if(diff<86400000) return Math.floor(diff/3600000)+'h ago';
  return Math.floor(diff/86400000)+'d ago';
}

// ═══════════════════════════════════════
//  HASH / BACK BUTTON
// ═══════════════════════════════════════
window.addEventListener('popstate', e=>{
  if(!S.user) return;
  const hash=window.location.hash.replace('#','');
  if(!hash){ navigate('home'); return; }
  const parts=hash.split('/');
  navigate(parts[0]||'home', parts[1]||null);
});

// ═══════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════
function initParticles(){
  const c=document.getElementById('particles');
  for(let i=0;i<25;i++){
    const p=document.createElement('div');
    p.className='par';
    p.style.cssText=`left:${Math.random()*100}%;animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*10}s;--dx:${(Math.random()-.5)*80}px`;
    c.appendChild(p);
  }
}

// ═══════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  initParticles();

  // Auth tabs
  document.querySelectorAll('.auth-tab').forEach(t=>{
    t.addEventListener('click',()=>switchTab(t.dataset.tab));
  });

  // Enter keys
  ['l-user','l-pass'].forEach(id=>{ document.getElementById(id)?.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); }); });
  ['r-name','r-user','r-pass','r-pass2'].forEach(id=>{ document.getElementById(id)?.addEventListener('keydown',e=>{ if(e.key==='Enter') doRegister(); }); });
  ['f-user','f-pass','f-pass2'].forEach(id=>{ document.getElementById(id)?.addEventListener('keydown',e=>{ if(e.key==='Enter') doForgot(); }); });

  // Close notif on outside click
  document.addEventListener('click',e=>{ if(!e.target.closest('#notifPanel')&&!e.target.closest('.notif-btn')) document.getElementById('notifPanel').classList.remove('open'); });
  // Close modal on outside
  document.getElementById('modal').addEventListener('click',e=>{ if(e.target===document.getElementById('modal')) closeModal(); });

  // Try session restore from localStorage first
  loadLocalDB();
  if(sessionLoad()){
    document.getElementById('loginPage').style.display='none';
    document.getElementById('app').style.display='block';
    initApp(true);
  }

  // Init Firebase (will also retry session after loading)
  initFB();
});
</script>
